title: minthug's Blog · 치지직 채팅 분석기
email: your-email@example.com
description: >-
  치지직 채팅 분석기 - 치지직 VOD·라이브 채팅 급증 구간을 자동으로 감지해 편집 포인트를 찾아주는 Chrome 확장 프로그램.
  개발자 minthug의 기술 블로그 · 치지직 하이라이트 · 채팅 스파이크 감지 · 영상 편집 도우미.

keywords: 치지직, 치지직 채팅, 치지직 채팅 분석기, chzzk, chzzk chat, 채팅 분석, 하이라이트, 편집 포인트, Chrome 확장 프로그램

baseurl: ""
url: "https://minthug.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# GitHub Pages 호환 설정
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false

# 제외할 파일들
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
