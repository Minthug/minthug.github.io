<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
</head>
<body>

  <!-- GitHub-style Header -->
  <header class="gh-header">
    <div class="gh-header-inner">
      <div class="gh-header-left">
        <a href="/" class="gh-logo" aria-label="Home">
          <svg height="32" viewBox="0 0 16 16" width="32" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <a href="/" class="gh-site-title">minthug</a>
        <span class="gh-badge">Public</span>
      </div>
      <div class="gh-header-right">
        <!-- 방문자 카운터 -->
        <div class="gh-visitor-counter">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" class="gh-visitor-icon">
            <path d="M8 2a5 5 0 00-4.546 2.916A5 5 0 108 2zm0 1.5a3.5 3.5 0 11-3.195 4.93A5.003 5.003 0 008 3.5zM2.965 8.248A3.5 3.5 0 108 11.5a5 5 0 01-5.035-3.252z"/>
          </svg>
          <span class="gh-visitor-label">일일</span>
          <span class="gh-visitor-num" id="today-count">—</span>
          <span class="gh-visitor-sep">·</span>
          <span class="gh-visitor-label">총</span>
          <span class="gh-visitor-num" id="total-count">—</span>
        </div>

        <nav class="gh-header-nav">
          <a href="/about/" class="gh-nav-link">About</a>
          <a href="https://github.com/minthug" class="gh-nav-link gh-nav-external" target="_blank" rel="noopener">
            GitHub
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M10.604 1h4.146a.25.25 0 01.25.25v4.146a.25.25 0 01-.427.177L13.03 4.03 9.28 7.78a.75.75 0 01-1.06-1.06l3.75-3.75-1.543-1.543A.25.25 0 0110.604 1zM3.75 2A1.75 1.75 0 002 3.75v8.5C2 13.216 2.784 14 3.75 14h8.5A1.75 1.75 0 0014 12.25v-3.5a.75.75 0 00-1.5 0v3.5a.25.25 0 01-.25.25h-8.5a.25.25 0 01-.25-.25v-8.5a.25.25 0 01.25-.25h3.5a.75.75 0 000-1.5h-3.5z"/></svg>
          </a>
        </nav>
      </div>

      <!-- hits.seeyoufarm.com: 실제 카운트 집계용 (숨김) -->
      <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fminthug.github.io&count_bg=%233fb950&title_bg=%23161b22&title=visit&edge_flat=true"
           id="hits-badge" alt="" aria-hidden="true"
           style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"
           onload="parsHits(this)" />

      <script>
        function parsHits(img) {
          // SVG에서 숫자 파싱
          fetch(img.src)
            .then(r => r.text())
            .then(svg => {
              const nums = [...svg.matchAll(/>(\d[\d,]*)</g)].map(m => m[1].replace(/,/g,''));
              if (nums.length >= 2) {
                document.getElementById('today-count').textContent = Number(nums[nums.length-2]).toLocaleString();
                document.getElementById('total-count').textContent = Number(nums[nums.length-1]).toLocaleString();
              }
            })
            .catch(() => {});
        }
      </script>
    </div>
  </header>

  <main class="gh-main">
    {{ content }}
  </main>

  <footer class="gh-footer">
    <div class="gh-footer-inner">
      <span>© 2025 minthug</span>
      <span class="gh-footer-dot">·</span>
      <a href="https://github.com/minthug" target="_blank" rel="noopener">GitHub</a>
      <span class="gh-footer-dot">·</span>
      <a href="/feed.xml">RSS</a>
    </div>
  </footer>

</body>
</html>
