<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8395038279284574"
     crossorigin="anonymous"></script>
</head>
<body>

{% if site.data.notice.enabled %}
<div class="gh-notice-overlay" id="noticeOverlay">
  <div class="gh-notice-modal">
    <div class="gh-notice-header">
      <span class="gh-notice-title">{{ site.data.notice.title }}</span>
      <button class="gh-notice-close" onclick="closeNotice(false)" aria-label="닫기">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.749.749 0 011.275.326.749.749 0 01-.215.734L9.06 8l3.22 3.22a.749.749 0 01-.326 1.275.749.749 0 01-.734-.215L8 9.06l-3.22 3.22a.751.751 0 01-1.042-.018.751.751 0 01-.018-1.042L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/></svg>
      </button>
    </div>
    <div class="gh-notice-body">
      {{ site.data.notice.content }}
    </div>
    <div class="gh-notice-footer">
      <button class="gh-notice-btn gh-notice-btn--dismiss" onclick="closeNotice(true)">오늘 하루 보지 않기</button>
      <button class="gh-notice-btn gh-notice-btn--close" onclick="closeNotice(false)">닫기</button>
    </div>
  </div>
</div>

<script>
(function() {
  var key = 'notice_dismissed';
  var stored = localStorage.getItem(key);
  if (stored && Date.now() - parseInt(stored) < 86400000) return;
  setTimeout(function() {
    document.getElementById('noticeOverlay').classList.add('gh-notice-overlay--visible');
  }, 400);
})();

function closeNotice(dismiss) {
  if (dismiss) localStorage.setItem('notice_dismissed', Date.now());
  document.getElementById('noticeOverlay').classList.remove('gh-notice-overlay--visible');
}
</script>
{% endif %}

  <!-- GitHub-style Header -->
  <header class="gh-header">
    <div class="gh-header-inner">
      <div class="gh-header-left">
        <a href="/" class="gh-logo" aria-label="Home">
          <svg height="32" viewBox="0 0 16 16" width="32" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <a href="/" class="gh-site-title">minthug</a>
        <span class="gh-badge">Public</span>
      </div>
      <div class="gh-header-right">
<nav class="gh-header-nav">
          <a href="/about/" class="gh-nav-link">About</a>
          <a href="/contact/" class="gh-nav-link">Contact</a>
          <a href="https://github.com/minthug" class="gh-nav-link gh-nav-external" target="_blank" rel="noopener">
            GitHub
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M10.604 1h4.146a.25.25 0 01.25.25v4.146a.25.25 0 01-.427.177L13.03 4.03 9.28 7.78a.75.75 0 01-1.06-1.06l3.75-3.75-1.543-1.543A.25.25 0 0110.604 1zM3.75 2A1.75 1.75 0 002 3.75v8.5C2 13.216 2.784 14 3.75 14h8.5A1.75 1.75 0 0014 12.25v-3.5a.75.75 0 00-1.5 0v3.5a.25.25 0 01-.25.25h-8.5a.25.25 0 01-.25-.25v-8.5a.25.25 0 01.25-.25h3.5a.75.75 0 000-1.5h-3.5z"/></svg>
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="gh-main">
    {{ content }}
  </main>

  <footer class="gh-footer">
    <div class="gh-footer-inner">
      <span>© 2025 minthug</span>
      <span class="gh-footer-dot">·</span>
      <a href="https://github.com/minthug" target="_blank" rel="noopener">GitHub</a>
      <span class="gh-footer-dot">·</span>
      <a href="/feed.xml">RSS</a>
    </div>
  </footer>


</body>
</html>
